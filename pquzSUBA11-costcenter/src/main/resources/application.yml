server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: costcenter
  profiles:
    active: local

  jackson:
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    root: INFO
    "[com.jt.costcenter]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE


management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings
  endpoint:
    health:
      show-details: always
