---
server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: summary
  profiles:
    active: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        formatsql: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    root: INFO
    "[com.jt.summary]": INFO
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings
  endpoint:
    mappings:
      access: unrestricted
    health:
      show-details: always

# =========================================================
# MOD: 全局生效 + 全引号（消除 YAML_SHOULD_ESCAPE）
